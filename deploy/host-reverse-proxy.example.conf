# Ubuntu/Debian üzerinde ZATEN nginx 1.18 (systemd) çalışıyorsa,
# tarayıcıda http://IP/ bu nginx'e gider; Docker'daki uygulama 403/yanlış sayfa vermez.
#
# Çözüm A — Sistem nginx'i kapatıp Docker'a 80'i vermek (basit):
#   sudo systemctl stop nginx
#   sudo systemctl disable nginx
#   cd ~/kyk-form && docker compose up -d
#
# Çözüm B — 80 sistem nginx'te kalsın, Docker'ı 8080'e alıp vekil yapalım:
#   1) .env içinde: WEB_PORT=8080
#   2) docker compose up -d --build
#   3) Bu dosyayı kopyalayın: /etc/nginx/sites-available/kyk-form
#   4) sudo ln -sf /etc/nginx/sites-available/kyk-form /etc/nginx/sites-enabled/
#   5) Varsayılan site 403 veriyorsa sites-enabled'deki gereksiz linki kaldırın
#   6) sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
