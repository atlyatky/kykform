# Tek konteyner: 80 = form doldurma (kısıtlı), 8080 = tam yönetim paneli

# --- Dış kullanım / form linkleri ---
server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 25m;

  location /api/public/ {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /logo.png {
    try_files /logo.png =404;
  }

  location = /favicon.ico {
    try_files /favicon.ico =404;
  }

  location ~* ^/(vite\.svg|robots\.txt)$ {
    try_files $uri =404;
  }

  location /f/ {
    try_files $uri $uri/ /index.html;
  }

  location = /f {
    return 302 /f/;
  }

  location / {
    default_type text/html;
    charset utf-8;
    return 200 '<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>KYK Form</title><body style="font-family:system-ui,sans-serif;max-width:36rem;margin:2rem auto;padding:0 1rem;line-height:1.5"><h1 style="font-size:1.1rem">Form doldurma</h1><p>Bu adreste yalnızca size iletilen <strong>tam form linki</strong> çalışır (adres çubuğunda <code>/f/...</code> olmalıdır).</p><p><strong>Yönetim paneli</strong> için: <code>http://SUNUCU_IP:8080</code></p></body>';
  }
}

# --- Yönetim (liste, düzenleme, tüm /api) ---
server {
  listen 8080;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 25m;

  location /api/ {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = / {
    try_files /index.html =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
